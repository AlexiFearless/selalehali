[build]
  publish = "."

[[headers]]
  for = "/makbuz.html"
  [headers.values]
    X-Frame-Options = "DENY"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/app/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
